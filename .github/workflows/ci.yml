name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: "nvim ${{ matrix.nvim-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim-version: [stable, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim (${{ matrix.nvim-version }})
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}

      - name: Install selene
        run: |
          SELENE_VER="0.30.1"
          curl -sL "https://github.com/Kampfkarren/selene/releases/download/${SELENE_VER}/selene-${SELENE_VER}-linux.zip" -o /tmp/selene.zip
          unzip -q -d /tmp /tmp/selene.zip selene
          chmod +x /tmp/selene
          sudo mv /tmp/selene /usr/local/bin/

      - name: Install StyLua
        run: |
          STYLUA_VER="v2.4.1"
          curl -sL "https://github.com/JohnnyMorganz/StyLua/releases/download/${STYLUA_VER}/stylua-linux-x86_64.zip" -o /tmp/stylua.zip
          unzip -q -d /tmp /tmp/stylua.zip stylua
          chmod +x /tmp/stylua
          sudo mv /tmp/stylua /usr/local/bin/

      - name: Cache .deps
        uses: actions/cache@v4
        with:
          path: .deps
          key: deps-mini-nvim-${{ hashFiles('tests/minit.lua') }}

      - name: Run CI (lint + test)
        run: make ci
